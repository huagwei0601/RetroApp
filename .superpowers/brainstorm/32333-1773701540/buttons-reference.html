<h2>Win98 Button States — Reference Match</h2>
<p class="subtitle">Secondary · Primary (default) · Inactive — matching your screenshot</p>

<div class="mockup">
  <div class="mockup-header">Button variants</div>
  <div class="mockup-body" style="background:#C0C0C0;padding:24px;font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;">

    <!-- Row matching reference exactly -->
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:32px;">

      <!-- Secondary button: < Back -->
      <button style="
        min-width:75px;height:23px;
        background:#C0C0C0;
        border-top:2px solid #fff;border-left:2px solid #fff;
        border-bottom:2px solid #404040;border-right:2px solid #404040;
        padding:0 12px;
        font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;
        cursor:default;
      ">&lt; <u>B</u>ack</button>

      <!-- Primary / default button: Next > — raised bevel + 1px black outer ring -->
      <div style="outline:1px solid #000;display:inline-flex;">
        <button style="
          min-width:75px;height:23px;
          background:#C0C0C0;
          border-top:2px solid #fff;border-left:2px solid #fff;
          border-bottom:2px solid #404040;border-right:2px solid #404040;
          padding:0 12px;
          font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;font-weight:400;
          cursor:default;
        "><u>N</u>ext &gt;</button>
      </div>

      <!-- Secondary button: Cancel -->
      <button style="
        min-width:75px;height:23px;
        background:#C0C0C0;
        border-top:2px solid #fff;border-left:2px solid #fff;
        border-bottom:2px solid #404040;border-right:2px solid #404040;
        padding:0 12px;
        font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;
        cursor:default;
      "><u>C</u>ancel</button>

    </div>

    <!-- All states reference panel -->
    <div style="border-top:1px solid #808080;padding-top:16px;">
      <div style="font-weight:700;margin-bottom:10px;">All button states</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">

        <!-- Default / secondary -->
        <button style="min-width:75px;height:23px;background:#C0C0C0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #404040;border-right:2px solid #404040;padding:0 12px;font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;cursor:default;">Secondary</button>

        <!-- Primary default -->
        <div style="outline:1px solid #000;display:inline-flex;">
          <button style="min-width:75px;height:23px;background:#C0C0C0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #404040;border-right:2px solid #404040;padding:0 12px;font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;cursor:default;">Primary</button>
        </div>

        <!-- Pressed / active -->
        <button style="min-width:75px;height:23px;background:#C0C0C0;border-top:2px solid #404040;border-left:2px solid #404040;border-bottom:2px solid #fff;border-right:2px solid #fff;padding:1px 11px 0 13px;font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;cursor:default;">Pressed</button>

        <!-- Disabled / inactive -->
        <button style="min-width:75px;height:23px;background:#C0C0C0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #404040;border-right:2px solid #404040;padding:0 12px;font-family:'MS Sans Serif','Tahoma',sans-serif;font-size:11px;color:#808080;cursor:default;" disabled>Disabled</button>

      </div>

      <div style="margin-top:12px;font-size:10px;color:#808080;">
        Primary = raised bevel + 1px solid #000 outer ring (wrapper div) · Pressed = sunken bevel + content offset 1px down-right · Disabled = gray text #808080
      </div>
    </div>

  </div>
</div>
